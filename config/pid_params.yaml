flight:
  base_throttle: 0.0            # SDK: 0 = hover, +1 = max climb, -1 = max descent
  camera_tilt: 20.0
  dt: 0.02
  chase_speed: 2800.0           # SEYIR hızı (100 km/h)
  takip_speed_margin: 500.0     # TAKIP'te hedefe göre fazla hız (yaklaşma marjı)

limits:
  min_pitch: -60.0
  max_pitch: 20.0
  min_throttle: -0.8
  max_throttle: 0.8

thresholds:
  seyir_dz: 800.0
  takip_dist: 8000.0
  seyir_fallback_dist: 5000.0

inner_pid:
  pitch: {kp: 0.045, ki: 0.0, kd: 0.005}
  roll: {kp: 0.35, ki: 0.0, kd: 0.002}
  yaw: {kp: 0.035, ki: 0.0005, kd: 0.002}

outer_pid:
  altitude: {kp: 0.20, ki: 0.02, kd: 0.05, clamp_min: -1.0, clamp_max: 0.45, int_limit: 2.0}
  speed: {kp: 2.5, ki: 0.5, kd: 0.1, clamp_min: -45.0, clamp_max: 45.0, int_limit: 20.0}

slew:
  pitch_max_change_per_sec: 20.0

# --- 5-metre arkadan takip güdümü ---
pursuit:
  follow_distance_cm: 1000.0   # hedefin kaç cm arkasında kal (değiştirilebilir)

  # Dış döngü PID: imzalı mesafe hatası (cm) → hız düzeltmesi (cm/s)
  # P: anlık hata, D: yaklaşma/uzaklaşma hızı (overshoot önler), I: sabit kayma giderir
  distance_pid:
    kp: 1.6
    ki: 1.3
    kd: 0.1
    int_limit: 200.0          # integral kaymasını ±200 cm/s ile sınırla

  min_speed_cms: 50.0        # minimum ileri hız (durma/geri gitme engeli)
  max_speed_cms: 2800.0       # maksimum yaklaşma hızı