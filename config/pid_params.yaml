flight:
  base_throttle: 0.58
  camera_tilt: 35.0
  dt: 0.02
  chase_speed: 2800.0          # SEYIR/TAKIP hızı (100 km/h)
  takip_speed_margin: 1000.0   # TAKIP'te hedefin üstüne çıkılacak hız
  angajman_speed_boost: 2000.0 # ANGAJMAN vurma hızı eklemesi

limits:
  min_pitch: -60.0
  max_pitch: 20.0
  min_throttle: 0.45
  max_throttle: 1.0

thresholds:
  seyir_dz: 800.0
  takip_dist: 8000.0
  lock_dist_max: 3000.0
  lock_dz_max: 1500.0
  lock_yaw_max: 15.0
  lock_on_secs: 3.0
  seyir_fallback_dist: 5000.0
  angajman_miss_dist: 3500.0

inner_pid:
  pitch: {kp: 0.045, ki: 0.0, kd: 0.005}
  roll: {kp: 0.35, ki: 0.0, kd: 0.002}
  yaw: {kp: 0.035, ki: 0.0, kd: 0.005}

outer_pid:
  altitude: {kp: 0.08, ki: 0.02, kd: 0.01, clamp_min: -0.25, clamp_max: 0.40, int_limit: 5.0}
  speed: {kp: 2.5, ki: 0.5, kd: 0.1, clamp_min: -45.0, clamp_max: 45.0, int_limit: 20.0}

slew:
  pitch_max_change_per_sec: 20.0